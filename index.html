<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A premium, glassmorphic weather dashboard with local storage, geolocation, 5-day and hourly forecasts." />
  <title>Tech Crush Weather Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="min-h-screen transition-colors duration-300">
  <div class="container mx-auto max-w-7xl px-3 py-4 sm:px-4 sm:py-6">

    <!-- Header Section -->
    <header id="header" class="mb-6 flex flex-col gap-4 sm:mb-8 sm:gap-6 lg:flex-row lg:items-center lg:justify-between">
      <div class="flex min-w-0 items-center gap-3">
        <!-- Brand Icon -->
        <div class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-2xl bg-cyan-600/20 text-cyan-400 sm:h-12 sm:w-12">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-2xl font-extrabold tracking-tight sm:text-3xl">Weather Dashboard</h1>
          <p class="text-slate-400 text-sm">Tech Crush Group 10</p>
        </div>
      </div>

      <!-- Action Area: Search, Geolocation, Theme Toggle, Profile -->
      <div class="flex w-full flex-col gap-3 sm:flex-row sm:items-center lg:w-auto">
        <div class="relative flex w-full min-w-0 items-center sm:w-64 sm:flex-initial">
          <input
            id="city-input"
            type="text"
            placeholder="Search city..."
            class="w-full rounded-xl bg-slate-900/60 border border-slate-800/80 focus:border-cyan-500/80 pl-4 pr-12 py-3 sm:py-2.5 outline-none text-white placeholder-slate-500 transition-all text-base sm:text-sm"
          />
          <button
            id="search-btn"
            class="absolute right-2 p-1.5 text-slate-400 hover:text-cyan-400 transition-colors"
            aria-label="Search"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
        </div>

        <button
          id="location-btn"
          class="flex w-full items-center justify-center gap-2 rounded-xl bg-slate-900/60 border border-slate-800/80 px-4 py-3 font-medium text-slate-200 hover:bg-slate-850 hover:text-white transition-all text-sm sm:w-auto sm:py-2.5"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span>Location</span>
        </button>

        <button
          id="theme-toggle"
          class="flex h-11 w-full items-center justify-center rounded-xl bg-slate-900/60 border border-slate-800/80 text-slate-300 hover:bg-slate-800/80 hover:text-white transition-all sm:h-10 sm:w-10 sm:flex-shrink-0"
          aria-label="Toggle theme"
        >
          <!-- Moon icon (default dark mode) -->
          <svg id="theme-toggle-dark-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          <!-- Sun icon (shown when light mode active) -->
          <svg id="theme-toggle-light-icon" class="hidden h-5 w-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828-9.9a5 5 0 117.07 7.07l-7.07-7.07z" />
          </svg>
        </button>

        <!-- Profile Avatar -->
        <!-- <div class="hidden sm:flex h-10 w-10 items-center justify-center rounded-xl border border-slate-800/80 bg-slate-900/60 overflow-hidden cursor-pointer hover:border-slate-700/80 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div> -->
      </div>
    </header>

    <!-- Main Dashboard Grid -->
    <main id="dashboard-container" class="grid min-w-0 gap-4 sm:gap-6 lg:grid-cols-3">

      <!-- Left Column (Span 2) -->
      <section class="min-w-0 space-y-4 sm:space-y-6 lg:col-span-2">
        
        <!-- Current Weather Card -->
        <section id="current-weather" class="glass-card p-4 sm:p-6 md:p-8 relative overflow-hidden current-weather-card">
          <!-- Loading Placeholder -->
          <div class="animate-pulse flex flex-col h-full justify-between gap-6">
            <div class="space-y-3">
              <div class="h-6 bg-slate-850 rounded w-1/4"></div>
              <div class="h-4 bg-slate-850 rounded w-1/3"></div>
            </div>
            <div class="flex items-center justify-between">
              <div class="h-24 bg-slate-850 rounded w-1/3"></div>
              <div class="h-24 w-24 bg-slate-850 rounded-full"></div>
            </div>
            <div class="h-6 bg-slate-850 rounded w-1/2"></div>
          </div>
        </section>

        <!-- Weather Details Grid -->
        <section id="details-grid" class="grid grid-cols-1 gap-3 min-[360px]:grid-cols-2 md:grid-cols-4 sm:gap-4">
          <!-- Populated Dynamically -->
          <div class="glass-card p-5 flex flex-col justify-between h-32 animate-pulse">
            <div class="h-6 w-6 bg-slate-850 rounded"></div>
            <div class="space-y-2">
              <div class="h-3 bg-slate-850 rounded w-1/2"></div>
              <div class="h-6 bg-slate-850 rounded w-3/4"></div>
            </div>
          </div>
          <div class="glass-card p-5 flex flex-col justify-between h-32 animate-pulse">
            <div class="h-6 w-6 bg-slate-850 rounded"></div>
            <div class="space-y-2">
              <div class="h-3 bg-slate-850 rounded w-1/2"></div>
              <div class="h-6 bg-slate-850 rounded w-3/4"></div>
            </div>
          </div>
          <div class="glass-card p-5 flex flex-col justify-between h-32 animate-pulse">
            <div class="h-6 w-6 bg-slate-850 rounded"></div>
            <div class="space-y-2">
              <div class="h-3 bg-slate-850 rounded w-1/2"></div>
              <div class="h-6 bg-slate-850 rounded w-3/4"></div>
            </div>
          </div>
          <div class="glass-card p-5 flex flex-col justify-between h-32 animate-pulse">
            <div class="h-6 w-6 bg-slate-850 rounded"></div>
            <div class="space-y-2">
              <div class="h-3 bg-slate-850 rounded w-1/2"></div>
              <div class="h-6 bg-slate-850 rounded w-3/4"></div>
            </div>
          </div>
        </section>

        <!-- 5-Day Forecast -->
        <section id="forecast-section" class="glass-card overflow-hidden p-4 sm:p-6">
          <h2 class="mb-4 flex items-center gap-2 text-base font-bold tracking-tight text-white sm:text-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            5-Day Forecast
          </h2>
          <div id="forecast" class="flex min-w-0 gap-3 overflow-x-auto pb-2 scroll-smooth sm:grid sm:grid-cols-5 sm:overflow-visible sm:pb-0">
            <!-- Populated Dynamically -->
          </div>
        </section>

        <!-- Hourly Forecast -->
        <section id="hourly-forecast-section" class="glass-card overflow-hidden p-4 sm:p-6">
          <h2 class="mb-4 flex items-center gap-2 text-base font-bold tracking-tight text-white sm:text-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Hourly Forecast
          </h2>
          <div id="hourly-forecast" class="flex min-w-0 gap-3 overflow-x-auto pb-2 scroll-smooth sm:gap-4">
            <!-- Populated Dynamically -->
          </div>
        </section>

      </section>

      <!-- Right Column (Sidebar) -->
      <aside class="min-w-0 space-y-4 sm:space-y-6">

        <!-- Recent Searches Card -->
        <section id="recent-searches-section" class="glass-card p-4 sm:p-6">
          <h2 class="mb-4 flex items-center gap-2 text-base font-bold tracking-tight text-white sm:text-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Recent Searches
          </h2>
          <div id="recent-searches" class="flex min-w-0 flex-wrap gap-2.5">
            <!-- Populated Dynamically -->
          </div>
        </section>

        <!-- Weather Highlights Card -->
        <section id="weather-highlights" class="glass-card p-4 sm:p-6">
          <h2 class="mb-5 flex items-center gap-2 text-base font-bold tracking-tight text-white sm:text-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            Weather Highlights
          </h2>
          <div id="highlights-grid" class="flex flex-col gap-4">
            <!-- Populated Dynamically -->
          </div>
        </section>

      </aside>

    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
